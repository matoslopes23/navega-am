services:
  postgres:
    image: postgres:16-alpine
    container_name: navega-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: navega
      POSTGRES_PASSWORD: navega
      POSTGRES_DB: navega
    ports:
      - "5432:5432"
    volumes:
      - navega-postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: navega-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - navega-redis-data:/data

  api:
    build:
      context: ./server
    container_name: navega-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://navega:navega@postgres:5432/navega
      DIRECT_URL: postgresql://navega:navega@postgres:5432/navega
      JWT_SECRET: ${JWT_SECRET:-development-only-change-me}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8080,http://localhost:5173}
      SWAGGER_ENABLED: ${SWAGGER_ENABLED:-true}
      PASSWORD_RESET_BASE_URL: ${PASSWORD_RESET_BASE_URL:-http://localhost:5173/reset-password}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-}
      PORT: 3000
    depends_on:
      - postgres
      - redis
    ports:
      - "3000:3000"

  web:
    build:
      context: ./web
    container_name: navega-web
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:3000
    depends_on:
      - api
    ports:
      - "8080:80"

volumes:
  navega-postgres-data:
  navega-redis-data:
